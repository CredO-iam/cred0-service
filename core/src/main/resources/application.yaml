spring:
  application:
    name: cred0-core
  datasource:
    url: jdbc:h2:mem:cred0;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

cred0:
  bootstrap:
    admin:
      username: ${CRED0_BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${CRED0_BOOTSTRAP_ADMIN_PASSWORD:change_me_admin_password}
      email: ${CRED0_BOOTSTRAP_ADMIN_EMAIL:admin@localhost}
      credentials-type: ${CRED0_BOOTSTRAP_ADMIN_CREDENTIALS_TYPE:password}
      enabled: ${CRED0_BOOTSTRAP_ADMIN_ENABLED:true}
